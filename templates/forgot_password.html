{% extends 'base.html' %}

{% block content %}
<div class="auth-container glass">
    <div class="header-actions" style="margin-bottom: 1.5rem;">
        <h2 style="margin: 0;">Reset Password</h2>
        <a href="{{ url_for('login') }}" class="btn btn-outline" style="padding: 0.5rem 1rem;"><i class="fa-solid fa-arrow-left"></i> Back</a>
    </div>
    
    <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">
        Enter your email address and we will generate a password reset link for you.
    </p>

    <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="you@example.com">
        </div>
        
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Send Reset Link</button>
    </form>
</div>
{% endblock %}
