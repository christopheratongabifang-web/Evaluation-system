{% extends 'base.html' %}

{% block content %}
<div class="auth-container glass">
    <div style="text-align: center; margin-bottom: 2rem;">
        <a href="{{ url_for('home') }}">
            <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="RUBRIC" style="height: 52px; max-width: 100%;">
        </a>
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin: 0.75rem 0 0;">Reset your account password</p>
    </div>
    
    <div class="header-actions" style="margin-bottom: 1.5rem;">
        <h2 style="margin: 0; font-size: 1.1rem;">Reset Password</h2>
        <a href="{{ url_for('login') }}" class="btn btn-outline" style="padding: 0.5rem 1rem;"><i class="fa-solid fa-arrow-left"></i> Back</a>
    </div>
    
    <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">
        Enter your phone number and we will send a 6-digit verification code to your phone.
    </p>

    <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="form-group">
            <label for="phone_number">Phone Number</label>
            <div style="margin-top: 0.4rem;">
                <input type="tel" id="phone_number" name="phone_number" class="form-control" required style="width: 100%;">
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Send Reset Code</button>
    </form>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
<style>
    .iti { width: 100%; }
    .iti__flag-container { border-radius: 0.5rem 0 0 0.5rem; }
</style>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const phoneInput = document.querySelector("#phone_number");
    const iti = window.intlTelInput(phoneInput, {
        utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js",
        initialCountry: "auto",
        separateDialCode: true,
        geoIpLookup: function(callback) {
            fetch("https://ipapi.co/json")
                .then(function(res) { return res.json(); })
                .then(function(data) { callback(data.country_code); })
                .catch(function() { callback("us"); });
        }
    });

    const form = document.querySelector('form');
    form.addEventListener('submit', function(e) {
        if (phoneInput.value.trim()) {
            phoneInput.value = iti.getNumber();
        }
    });
});
</script>
{% endblock %}
