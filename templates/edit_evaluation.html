{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg">
                <div class="card-header bg-warning text-dark">
                    <h3 class="mb-0">Edit Evaluation</h3>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="form-group mb-3">
                            <label for="title" class="form-label fw-bold">Evaluation Title</label>
                            <input type="text" class="form-control form-control-lg" id="title" name="title" value="{{ evaluation.title }}" required>
                        </div>

                        <div class="form-group mb-3">
                            <label for="description" class="form-label fw-bold">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3">{{ evaluation.description or '' }}</textarea>
                        </div>

                        <div class="form-group mb-3">
                            <label for="topic_id" class="form-label fw-bold">Subject / Topic</label>
                            <select class="form-control form-control-lg" id="topic_id" name="topic_id">
                                <option value="">No Topic (General)</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if evaluation.topic_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group mb-3">
                            <label for="target_class" class="form-label fw-bold">Target Class</label>
                            <select class="form-control form-control-lg" id="target_class" name="target_class">
                                <option value="All" {% if evaluation.target_class == 'All' %}selected{% endif %}>All Classes</option>
                                {% for c in academic_classes %}
                                <option value="{{ c.name }}" {% if evaluation.target_class == c.name %}selected{% endif %}>{{ c.display_name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="total_marks" class="form-label fw-bold">Total Marks</label>
                                    <input type="number" class="form-control form-control-lg" id="total_marks" name="total_marks" value="{{ evaluation.total_marks }}" min="10" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="passing_percentage" class="form-label fw-bold">Passing Percentage (%)</label>
                                    <input type="number" class="form-control form-control-lg" id="passing_percentage" name="passing_percentage" value="{{ evaluation.passing_percentage }}" min="0" max="100" step="0.1" required>
                                </div>
                            </div>
                        </div>

                        <div class="form-group mb-3">
                            <label for="time_limit_minutes" class="form-label fw-bold">Time Limit (minutes)</label>
                            <input type="number" class="form-control form-control-lg" id="time_limit_minutes" name="time_limit_minutes" value="{{ evaluation.time_limit_minutes }}" min="5" required>
                        </div>

                        <div class="form-group mb-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {% if evaluation.is_active %}checked{% endif %}>
                                <label class="form-check-label" for="is_active">
                                    <strong>Active</strong> - Allow students to take this evaluation
                                </label>
                            </div>
                        </div>

                        <div class="alert alert-info" role="alert">
                            <strong>Note:</strong> Once students start taking this evaluation, it will be locked and cannot be edited.
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{{ url_for('admin_evaluations') }}" class="btn btn-secondary btn-lg">Cancel</a>
                            <button type="submit" class="btn btn-warning btn-lg">Update Evaluation</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
