{% extends 'base.html' %}

{% block content %}
<div class="auth-container glass">
    <h2 style="margin-bottom: 2rem; text-align: center;">Set New Password</h2>
    
    <form method="POST" action="">
        <div class="form-group" style="margin-bottom: 1rem;">
            <label for="otp">One-Time Password (OTP)</label>
            <input type="text" id="otp" name="otp" class="form-control" required placeholder="123456" pattern="\d{6}" title="6-digit OTP code">
        </div>
        
        <div class="form-group">
            <label for="password">New Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
                <i class="fa-regular fa-eye password-toggle" id="togglePassword"></i>
            </div>
            <p style="margin-top: 0.5rem; font-size: 0.875rem; color: var(--text-secondary);">Password must include at least one uppercase letter and one special character.</p>
        </div>
        
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Update Password</button>
    </form>
</div>
{% endblock %}
